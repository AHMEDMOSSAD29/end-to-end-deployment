apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app-1-dev-hpa
  namespace: app-1-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app-1-dev
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70