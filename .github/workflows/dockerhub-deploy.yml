name: Test Docker Hub Build and Push

on:
  push:
    branches: [ main, dev ] # Trigger on your existing branches

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Tags the image with your username and the unique GitHub run number
          tags: |
            ahmedmosaad594/ahmed-mosaad-resume:latest
            ahmedmosaad594/ahmed-mosaad-resume:v1.${{ github.run_number }}